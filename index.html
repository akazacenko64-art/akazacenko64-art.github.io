<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body {
            background: black;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            padding: 30px;
            width: 300px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            background: white;
            border: 1px solid black;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 8px;
            background: black;
            color: white;
            border: none;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #333;
        }
        .msg {
            margin-top: 15px;
            font-size: 12px;
            min-height: 40px;
        }
        .error {
            color: red;
        }
        .success {
            color: green;
        }
    </style>
</head>
<body>
    <div class="box">
        <h3>Вход</h3>
        <input type="text" id="login" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button onclick="check()">Войти</button>
        <div id="msg" class="msg"></div>
    </div>

    <script>
        // ЗДЕСЬ МЕНЯЕШЬ ЛОГИН И ПАРОЛЬ
        const CORRECT_LOGIN = "admin";
        const CORRECT_PASSWORD = "123";

        function check() {
            let login = document.getElementById('login').value;
            let pass = document.getElementById('password').value;
            let msg = document.getElementById('msg');

            if (login === CORRECT_LOGIN && pass === CORRECT_PASSWORD) {
                msg.innerHTML = "✅ Доступ разрешён";
                msg.className = "msg success";
                // Через 1 секунду перекинет на нужный сайт
                setTimeout(() => {
                    window.location.href = "https://example.com";
                }, 1000);
            } else {
                msg.innerHTML = "❌ Неверный логин или пароль";
                msg.className = "msg error";
                document.getElementById('password').value = "";
            }
        }

        // Чтобы Enter работал
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') check();
        });
    </script>
</body>
</html>
